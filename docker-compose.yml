services:
  ldxpm:
    image: ghcr.io/ikeilo/ldxpm:${IMAGE_TAG:-latest}
    container_name: ldxpm
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: ${PORT:-8765}
      DB_PATH: /app/data/ldxp_stock_webapp.sqlite3
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      UPSTREAM_MIN_REQUEST_INTERVAL_SECONDS: ${UPSTREAM_MIN_REQUEST_INTERVAL_SECONDS:-5}
      UPSTREAM_HUMAN_CHECK_COOLDOWN_SECONDS: ${UPSTREAM_HUMAN_CHECK_COOLDOWN_SECONDS:-1800}
      PURCHASE_VALIDATION_INTERVAL_SECONDS: ${PURCHASE_VALIDATION_INTERVAL_SECONDS:-21600}
    ports:
      - "${PORT:-8765}:${PORT:-8765}"
    volumes:
      - ./data:/app/data
